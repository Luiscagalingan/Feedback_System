<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Feedback Satisfaction System - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: url('Background.jpg') center/cover no-repeat fixed;
      color: #222;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    body.fade-in {
      opacity: 1;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 31, 63, 0.8), rgba(0, 64, 128, 0.6));
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      background: linear-gradient(90deg, #001F3F, #004080, #0074D9);
      padding: 15px 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(15px);
      border-radius: 0 0 25px 25px;
      width: 100%;
    }

    .navbar-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-brand {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbar-brand i {
      font-size: 24px;
    }

    .navbar-menu {
      display: flex;
      gap: 30px;
      list-style: none;
      align-items: center;
      flex-wrap: wrap;
    }

    .navbar-menu a {
      color: #f1f1f1;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .navbar-menu a:hover,
    .navbar-menu a.active {
      color: #ffcc00;
      transform: translateY(-3px);
      text-shadow: 0 2px 5px rgba(255, 204, 0, 0.5);
    }

    .logout-btn {
      background: linear-gradient(90deg, #ff4b5c, #e03e4e);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 4px 10px rgba(255, 75, 92, 0.3);
    }

    .logout-btn:hover {
      background: linear-gradient(90deg, #e03e4e, #c5303a);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(255, 75, 92, 0.4);
    }

    #dashboardPage {
      display: block;
      padding-top: 30px;
      animation: fadeIn 0.5s ease-in;
    }

    /* Dashboard Header */
    .dashboard-header {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 15px 40px rgba(0, 64, 128, 0.15);
      backdrop-filter: blur(15px);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      /* Animation */
      opacity: 0;
      animation: slideUpFadeIn 0.6s ease-out 0.2s forwards;
    }

    .dashboard-header h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #003366;
      margin-bottom: 15px;
      font-weight: 700;
      font-size: 2.5em;
      gap: 10px;
    }

    .dashboard-header p {
      color: #555;
      font-size: 1.2em;
      font-weight: 300;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
      overflow-x: hidden;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      transition: all 0.4s ease;
      border: 1px solid #e9ecef;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #004080, #0074D9);
      border-radius: 20px 20px 0 0;
    }

    .stat-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .stat-card-value {
      font-size: 36px;
      font-weight: 700;
      color: #003366;
      margin-bottom: 10px;
    }

    .stat-card-label {
      font-size: 14px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      font-weight: 500;
    }

    /* Inspirational Quote Section */
    .quote-container {
      background: rgba(255, 255, 255, 0.08);
      border-left: 6px solid #004080;
      margin: 0 auto 30px auto;
      padding: 30px 35px;
      border-radius: 0 15px 15px 0;
      max-width: 85%;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      position: relative;
      /* Animation */
      opacity: 0;
      animation: slideUpFadeIn 0.6s ease-out 0.4s forwards;
    }

    .quote-container::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 60px;
      color: rgb(255, 255, 255);
      font-family: serif;
    }

    .quote-text {
      font-size: 22px;
      font-style: italic;
      color: #ffffff;
      margin-bottom: 15px;
      line-height: 1.6;
      font-weight: 400;
    }

    .quote-author {
      font-size: 18px;
      color: #ffffff;
      text-align: right;
      font-weight: 600;
    }

    /* Feedback Section */
    .feedback-section {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 64, 128, 0.15);
      backdrop-filter: blur(15px);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      /* Animation */
      opacity: 0;
      animation: slideUpFadeIn 0.6s ease-out 0.6s forwards;
    }

    .feedback-section h2 {
      color: #003366;
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .submit-btn {
      background: linear-gradient(90deg, #004080, #0074D9, #339CFF);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 64, 128, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:hover {
      background: linear-gradient(90deg, #0059b3, #339CFF, #66B3FF);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 64, 128, 0.5);
    }

    /* Loading Overlay */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      z-index: 3000;
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: #004080;
      font-weight: bold;
      transition: opacity 0.3s ease;
      flex-direction: column;
      gap: 15px;
    }

    #loadingOverlay i {
      font-size: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideUpFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar-menu {
        gap: 15px;
      }
      .dashboard-header h1 {
        font-size: 2em;
      }
      .quote-container {
        max-width: 95%;
        padding: 20px 25px;
      }
      .feedback-section {
        padding: 25px;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar" id="navbar">
    <div class="navbar-content">
      <div class="navbar-brand">
        <i class="fas fa-graduation-cap"></i>
        Student Feedback System
      </div>
      <ul class="navbar-menu" id="navbarMenu">
        <li><a href="#" class="nav-link active" data-page="dashboard"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="#" class="nav-link" id="profileLink"><i class="fas fa-user"></i> Profile</a></li>
        <li><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
      </ul>
    </div>
  </nav>

  <!-- Dashboard Page -->
  <div id="dashboardPage">
    <div class="container">
      <div class="dashboard-header">
        <h1><i class="fas fa-wave-square"></i> Welcome Student!</h1>
        <p>Your voice helps us grow and improve.</p>
      </div>

      <!-- Inspirational Quote Section -->
      <div class="quote-container">
        <p class="quote-text">"Feedback is the breakfast of champions."</p>
        <p class="quote-author">- Ken Blanchard</p>
      </div>

      <div class="feedback-section">
        <h2><i class="fas fa-comments"></i> We Value Your Feedback</h2>
        <button class="submit-btn" id="submitFeedbackBtn"><i class="fas fa-edit"></i> Submit Feedback</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    Loading...
  </div>

  <script>
    window.addEventListener("load", () => {
      document.body.classList.add("fade-in");

      // --- Inspirational Quotes Logic ---
      const quotes = [
        { text: "Feedback is the breakfast of champions.", author: "Ken Blanchard" },
        { text: "We all need people who will give us feedback. That's how we improve.", author: "Bill Gates" },
        { text: "The key to learning is feedback. It is nearly impossible to learn anything without it.", author: "Steven Levitt" },
        { text: "Your most unhappy customers are your greatest source of learning.", author: "Bill Gates" },
        { text: "Continuous improvement is better than delayed perfection.", author: "Mark Twain" }
      ];

      const randomIndex = Math.floor(Math.random() * quotes.length);
      const randomQuote = quotes[randomIndex];

      document.querySelector(".quote-text").textContent = `"${randomQuote.text}"`;
      document.querySelector(".quote-author").textContent = `- ${randomQuote.author}`;
      // --- End of Quotes Logic ---
    });

    const loadingOverlay = document.getElementById("loadingOverlay");

    document.getElementById("logoutBtn").addEventListener("click", () => {
      if (confirm("Are you sure you want to log out?")) {
        loadingOverlay.textContent = "Logging out...";
        loadingOverlay.style.display = "flex";
        document.body.style.opacity = "0.7";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
      }
    });

    document.getElementById("profileLink").addEventListener("click", () => {
      loadingOverlay.textContent = "Loading profile...";
      loadingOverlay.style.display = "flex";
      document.body.style.opacity = "0.7";
      setTimeout(() => {
        window.location.href = "Profile_System.html";
      }, 1000);
    });

    document.getElementById("submitFeedbackBtn").addEventListener("click", () => {
      loadingOverlay.textContent = "Loading feedback form...";
      loadingOverlay.style.display = "flex";
      document.body.style.opacity = "0.7";
      setTimeout(() => {
        window.location.href = "dashboard_Submit.html";
      }, 1000);
    });

  </script>
</body>
</html>
