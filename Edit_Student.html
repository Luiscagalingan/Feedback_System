<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Student</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 400px;
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #004080;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #004080;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #003366;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #004080;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Edit Student Details</h2>
    <form id="editStudentForm" action="update_student.php" method="POST">
      <input type="hidden" id="studentDbId" name="id">

      <label for="student_id">Student ID:</label>
      <input type="text" id="student_id" name="student_id" placeholder="Student ID" required>

      <label for="student_name">Full Name:</label>
      <input type="text" id="student_name" name="student_name" placeholder="Full Name" required>

      <label for="program">Program:</label>
      <input type="text" id="program" name="program" placeholder="Program" required>

      <label for="section">Section:</label>
      <input type="text" id="section" name="section" placeholder="Section" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Email" required>

      <button type="submit">Save Changes</button>
    </form>
    <a href="javascript:history.back()" class="back-link">← Back to Dashboard</a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const studentId = urlParams.get('id');
      const fromPage = urlParams.get('from') || 'javascript:history.back()';
      document.querySelector('.back-link').href = fromPage;

      if (studentId) {
        fetch(`get_student_details.php?id=${studentId}`)
          .then(response => { if (!response.ok) { throw new Error('Network response was not ok'); } return response.json(); })
          .then(data => {
            if (data.success) {
              const student = data.student;
              document.getElementById('studentDbId').value = student.id;
              document.getElementById('student_id').value = student.student_id;
              document.getElementById('student_name').value = student.student_name;
              document.getElementById('program').value = student.program;
              document.getElementById('section').value = student.section;
              document.getElementById('email').value = student.email;
            } else {
              AppAlert.error('Unable to Load Student','Could not fetch student details.').then(()=>window.location.href=fromPage);
            }
          })
          .catch(error => {
            console.error('Fetch error:', error);
            AppAlert.error('Unable to Load Student','An error occurred while fetching student data.').then(()=>window.location.href=fromPage);
          });
      } else {
        AppAlert.error('Missing Student ID','No student ID was provided.').then(()=>window.location.href=fromPage);
      }
    });
  </script><script src="shared-alerts.js"></script>
</body>
</html>
