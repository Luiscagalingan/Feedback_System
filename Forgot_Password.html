<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 0;
            position: relative;
            z-index: 1;
        }

        .logo-header {
            background-color: #ffffff;
            padding: 40px 30px 20px;
            text-align: center;
            color: #022c5a;
            border-bottom: 1px solid #e9ecef;
        }

        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-header img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .logo-header h2 {
            font-size: 1.8em;
            margin: 0;
            color: #022c5a;
        }

        .logo-header p {
            margin-top: 5px;
            font-size: 0.95em;
            color: #6c757d;
        }

        .form-section {
            padding: 30px;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #022c5a;
            font-size: 0.95em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: #ffffff;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f8d420; /* Yellow focus border */
            box-shadow: 0 0 0 3px rgba(248, 212, 32, 0.25);
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-bottom: 15px;
        }

        .btn-reset {
             background-color: #022c5a; /* Dark blue button */
            color: white;
        }

        .btn-login:hover {
           background-color: #f8d420; /* Yellow hover */
            color: #022c5a;
            transform: translateY(-1px);
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
            background-color: #ffffff;
        }

        .footer-note p {
            color: #6c757d;
            font-size: 0.9em;
            margin: 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                background-attachment: scroll;
            }
            .container {
                max-width: 100%;
                border-radius: 10px;
            }
            .logo-header {
                padding: 30px 20px 15px;
            }
            .logos {
                gap: 10px;
                flex-direction: column;
            }
            .logo-header img {
                max-width: 80px;
                max-height: 80px;
            }
            .logo-header h2 {
                font-size: 1.5em;
            }
            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-header">
        <div class="logos">
            <img src="plpwalaa.png" alt="School Logo" id="schoolLogo">
        </div>
        <h2>Reset Your Password</h2>
        <p>Enter your email address to receive a verification code.</p>
    </div>

    <div class="form-section">
        <form id="forgotForm" method="POST">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                <div class="error" id="emailError">Please enter a valid email address.</div>
            </div>
            <button type="submit" class="btn btn-reset">Send Verification Code</button>
        </form>

        <div class="footer-note">
            <p>Remember your password?
                <a href="index.html" style="color: #022c5a; text-decoration: none; font-weight: bold;">Login here</a>.
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', function(event) {
    event.preventDefault();  
    
    const email = document.getElementById('email').value.trim();
    const errorDiv = document.getElementById('emailError');

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email || !emailRegex.test(email)) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Please enter a valid email address.';
        return;
    } else {
        errorDiv.style.display = 'none';
    }

    fetch("forgot_password.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "email=" + encodeURIComponent(email)
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "OtpVerification.html";
        } else {
            errorDiv.style.display = 'block';
            errorDiv.textContent = data.message;
        }
    })
    .catch(() => {
        errorDiv.style.display = 'block';
        errorDiv.textContent = "Error sending request";
    });
});
</script>

</body>
</html>
