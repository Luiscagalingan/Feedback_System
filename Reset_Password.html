<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>New Password | PLP Feedback System</title><link rel="stylesheet" href="password-reset.css"></head>
<body><main class="login-shell"><section class="brand-panel"><div class="brand-content"><div class="logo-wrap"><img src="logoooo.jfif" alt="Service Satisfaction logo"></div><p class="kicker">Pamantasan ng Lungsod ng Pasig</p><h1>Student Feedback<br>Management System</h1><p>Secure account recovery for the university feedback portal.</p><small>&copy; 2025 Pamantasan ng Lungsod ng Pasig</small></div></section>
<section class="form-panel"><div class="login-card"><h2>Create a new password</h2><p class="subcopy">Use at least eight characters and keep your password private.</p><form id="resetForm" novalidate><div class="input-group"><label for="password">New password</label><div class="field-control"><span class="icon">&#128274;</span><input type="password" id="password" name="password" minlength="8" autocomplete="new-password" required></div></div><div class="input-group"><label for="confirm_password">Confirm new password</label><div class="field-control"><span class="icon">&#128274;</span><input type="password" id="confirm_password" name="confirm_password" minlength="8" autocomplete="new-password" required></div><div class="error-message" id="formMessage" role="alert"></div></div><button class="btn" id="submitBtn" type="submit"><span class="spinner"></span><span class="button-text">Change password</span></button></form><p class="back-link"><a href="index.html">Back to sign in</a></p></div></section></main>
<script src="shared-alerts.js"></script><script src="password-reset.js"></script><script>setupAsyncForm({formId:'resetForm',endpoint:'reset_password.php',loadingText:'Changing password...',onSuccess:function(message){AppAlert.success('Password Changed',message).then(()=>{location.href='index.html';});}});</script></body></html>
