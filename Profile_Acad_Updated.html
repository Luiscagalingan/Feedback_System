<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSA Profile — PLP Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1f2937; }
    body { display: flex; align-items: center; justify-content: center; padding: 25px; }
    .profile-card { width: 100%; max-width: 720px; background: #ffffff; border-radius: 28px; box-shadow: 0 24px 60px rgba(15,23,42,0.08); overflow: hidden; }
    .profile-card-header { background: linear-gradient(135deg,#ffb020,#fb8c00); padding: 34px 36px 22px; position: relative; }
    .profile-card-header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(255,255,255,0.45), transparent 30%); opacity: 0.45; }
    .profile-card-title { position: relative; display: flex; align-items: center; gap: 14px; color: #fff; z-index: 1; }
    .profile-card-title h1 { font-size: 1.8rem; line-height: 1.1; }
    .profile-card-title span { display: block; font-size: 0.95rem; font-weight: 500; opacity: 0.92; }
    .profile-card-actions { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 14px; position: relative; z-index: 1; }
    .profile-card-actions button { border: none; border-radius: 14px; background: rgba(255,255,255,0.18); color: white; padding: 12px 18px; font-weight: 600; cursor: pointer; transition: transform .2s ease, background .2s ease; }
    .profile-card-actions button:hover { transform: translateY(-2px); background: rgba(255,255,255,0.26); }
    .profile-card-body { padding: 32px; display: grid; gap: 26px; }
    .profile-summary { display: grid; gap: 18px; padding: 26px; border-radius: 22px; background: #f8fbff; border: 1px solid #e5e9f0; }
    .profile-summary h2 { font-size: 1.2rem; color: #0f172a; }
    .profile-meta { display: grid; gap: 14px; }
    .profile-meta .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 14px 18px; background: #ffffff; border-radius: 16px; border: 1px solid #e5e9f0; }
    .profile-meta .meta-row span:first-child { color: #6b7280; font-size: 0.95rem; }
    .profile-meta .meta-row span:last-child { color: #111827; font-weight: 600; }
    .profile-form { display: grid; gap: 20px; }
    .profile-form h3 { font-size: 1.05rem; color: #111827; }
    .profile-inputs { display: grid; gap: 14px; }
    .profile-inputs label { display: block; font-size: 0.92rem; color: #4b5563; margin-bottom: 8px; }
    .profile-inputs input { width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; border-radius: 14px; font-size: 0.95rem; color: #111827; background: #f9fafb; }
    .profile-inputs input:focus { outline: none; border-color: #fb8c00; box-shadow: 0 0 0 4px rgba(251,140,0,0.12); }
    .profile-buttons { display: flex; flex-wrap: wrap; gap: 14px; justify-content: flex-end; }
    .profile-buttons button { border: none; border-radius: 14px; padding: 14px 20px; font-weight: 700; cursor: pointer; transition: transform .2s ease, opacity .2s ease; }
    .btn-primary { background: #0f62fe; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .profile-buttons button:hover { transform: translateY(-1px); }
    .profile-footer { padding: 0 26px 28px; color: #6b7280; font-size: 0.95rem; text-align: center; }
    @media (max-width: 680px) { .profile-card { margin: 0 16px; } .profile-card-actions { flex-direction: column; } .profile-buttons { justify-content: stretch; } }
  </style>
</head>
<body>
  <section class="profile-card">
    <div class="profile-card-header">
      <div class="profile-card-title">
        <div>
          <h1>Dean Profile</h1>
          <span>College of Business and Accountancy</span>
        </div>
      </div>
      <div class="profile-card-actions">
        <button type="button" id="editProfileBtn"><i class="fas fa-user-edit"></i> Edit Profile</button>
        <button type="button" id="changePasswordBtn"><i class="fas fa-key"></i> Change Password</button>
        <button type="button" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <div class="profile-card-body">
      <div class="profile-summary">
        <h2>Profile Details</h2>
        <div class="profile-meta">
          <div class="meta-row"><span>Name</span><span id="profileName">Loading...</span></div>
          <div class="meta-row"><span>Email</span><span id="profileEmail">Loading...</span></div>
          <div class="meta-row"><span>Role</span><span id="profileRole">Dean</span></div>
          <div class="meta-row"><span>College</span><span id="profileCollege">College of Business and Accountancy</span></div>
        </div>
      </div>

      <div class="profile-form">
        <div>
          <h3>Update Password</h3>
          <div class="profile-inputs">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" placeholder="Enter current password">
          </div>
          <div class="profile-inputs">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
          </div>
          <div class="profile-inputs">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
          </div>
        </div>
        <div class="profile-buttons">
          <button class="btn-secondary" type="button" id="cancelPasswordBtn">Cancel</button>
          <button class="btn-primary" type="button" id="savePasswordBtn">Update Password</button>
        </div>
      </div>
    </div>

    <div class="profile-footer">
      <p>All fields are synced with the database. Make sure the information is up to date for your profile.</p>
    </div>
  </section>

  <script>
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const profileRole = document.getElementById('profileRole');
    const profileCollege = document.getElementById('profileCollege');
    const logoutBtn = document.getElementById('logoutBtn');
    const savePasswordBtn = document.getElementById('savePasswordBtn');
    const cancelPasswordBtn = document.getElementById('cancelPasswordBtn');
    const currentPassword = document.getElementById('currentPassword');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');

    function showAlert(message) {
      alert(message);
    }

    function loadProfile() {
      fetch('get_profile.php')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            profileName.textContent = data.name || 'N/A';
            profileEmail.textContent = data.email || 'N/A';
            profileRole.textContent = data.role || 'Dean';
            profileCollege.textContent = data.college || 'College of Business and Accountancy';
          } else {
            profileName.textContent = 'Not available';
            profileEmail.textContent = 'Not available';
            showAlert(data.message || 'Unable to load profile');
          }
        })
        .catch(() => {
          profileName.textContent = 'Error';
          profileEmail.textContent = 'Error';
          showAlert('Error loading profile data.');
        });
    }

    logoutBtn.addEventListener('click', () => {
      if (confirm('Confirm logout?')) {
        window.location.href = 'index.html';
      }
    });

    savePasswordBtn.addEventListener('click', () => {
      if (!currentPassword.value || !newPassword.value || !confirmPassword.value) {
        return showAlert('Please complete all password fields.');
      }
      if (newPassword.value !== confirmPassword.value) {
        return showAlert('New password and confirm password do not match.');
      }
      showAlert('Password update function is ready. Submit to the database integration point.');
    });

    cancelPasswordBtn.addEventListener('click', () => {
      currentPassword.value = '';
      newPassword.value = '';
      confirmPassword.value = '';
    });

    document.addEventListener('DOMContentLoaded', loadProfile);
  </script>
</body>
</html>
