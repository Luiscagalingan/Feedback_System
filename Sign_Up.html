<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 0;
            position: relative;
            z-index: 1;
        }

        .logo-header {
            background-color: #ffffff;
            padding: 40px 30px 20px;
            text-align: center;
            color: #007bff;
            border-bottom: 1px solid #e9ecef;
        }

        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-header img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .logo-header h2 {
            font-size: 1.8em;
            margin: 0;
            color: #007bff;
        }

        .logo-header p {
            margin-top: 5px;
            font-size: 0.95em;
            color: #6c757d;
        }

        .form-section {
            padding: 30px;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #0056b3;
            font-size: 0.95em;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: #ffffff;
        }

        .input-group input:focus, 
        .input-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-bottom: 15px;
        }

        .btn-signup {
            background-color: #007bff;
            color: #ffffff;
        }

        .btn-signup:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
            background-color: #ffffff;
        }

        .footer-note p {
            color: #6c757d;
            font-size: 0.9em;
            margin: 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                background-attachment: scroll;
            }
            
            .container {
                max-width: 100%;
                border-radius: 10px;
            }
            
            .logo-header {
                padding: 30px 20px 15px;
            }
            
            .logos {
                gap: 10px;
                flex-direction: column;
            }
            
            .logo-header img {
                max-width: 80px;
                max-height: 80px;
            }
            
            .logo-header h2 {
                font-size: 1.5em;
            }
            
            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <div class="logos">
                <img src="plpwalaa.png" alt="School Logo" id="schoolLogo">
            </div>
            <h2>Sign up Form</h2>
            <p>Please fill in your details to create an account.</p>
        </div>
        
        <div class="form-section">
            <form id="signupForm" action="signup.php" method="POST">

                <!-- Added dropdown -->
                <div class="input-group">
                    <label for="userType">Select Role</label>
                    <select id="userType" name="userType" required>
                        <option value="Student">Student</option>
                        <option value="Academic Teacher">Academic Teacher</option>
                        <option value="Non-Academic Teacher">Non-Academic Teacher</option>
                    </select>
                </div>

                <div class="input-group" id="studentIdGroup">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" name="studentId" placeholder="Enter your Student ID" 
                        pattern="[0-9\-]+" title="Student ID must contain numbers and hyphens only"
                        oninput="this.value = this.value.replace(/[^0-9\-]/g, '');">
                </div>
                
                <div class="input-group">
                    <label for="studentName">Full Name</label>
                    <input type="text" id="studentName" name="studentName" placeholder="Enter your full name" required>
                </div>
                
                <div class="input-group" id="programGroup">
                    <label for="program">Program</label>
                    <input type="text" id="program" name="program" placeholder="Enter your program">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="6">
                </div>
                
                <div class="error" id="passwordError">Passwords do not match.</div>
                
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-signup">Sign Up</button>
            </form>
            
            <div class="footer-note">
                <p>Already have an account? 
                    <a href="index.html" id="loginLink" style="color: #007bff; text-decoration: none;">Login here</a>.
                </p>
            </div>
        </div>
    </div>

    <script>
        const userType = document.getElementById('userType');
        const studentIdGroup = document.getElementById('studentIdGroup');
        const programGroup = document.getElementById('programGroup');

        userType.addEventListener('change', function() {
            if (this.value === 'Student') {
                studentIdGroup.style.display = 'block';
                programGroup.style.display = 'block';
                document.getElementById('studentId').required = true;
                document.getElementById('program').required = true;
            } else {
                studentIdGroup.style.display = 'none';
                programGroup.style.display = 'none';
                document.getElementById('studentId').required = false;
                document.getElementById('program').required = false;
            }
        });

        document.getElementById('signupForm').addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('passwordError');

            if (password !== confirmPassword) {
                event.preventDefault();
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
