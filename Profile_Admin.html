<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile - Feedback System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: url('Background.jpg') center/cover no-repeat fixed;
      color: #222;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    body.fade-in {
      opacity: 1;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 31, 63, 0.8), rgba(0, 64, 128, 0.6));
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      background: linear-gradient(90deg, #001F3F, #004080, #0074D9);
      padding: 15px 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(15px);
      border-radius: 0 0 25px 25px;
      width: 100%;
    }

    .navbar-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-brand {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbar-brand i {
      font-size: 24px;
    }

    .navbar-menu {
      display: flex;
      gap: 30px;
      list-style: none;
      align-items: center;
      flex-wrap: wrap;
    }

    .navbar-menu a {
      color: #f1f1f1;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .navbar-menu a:hover,
    .navbar-menu a.active {
      color: #ffcc00;
      transform: translateY(-3px);
      text-shadow: 0 2px 5px rgba(255, 204, 0, 0.5);
    }

    .logout-btn {
      background: linear-gradient(90deg, #ff4b5c, #e03e4e);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 4px 10px rgba(255, 75, 92, 0.3);
    }

    .logout-btn:hover {
      background: linear-gradient(90deg, #e03e4e, #c5303a);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(255, 75, 92, 0.4);
    }

    .navbar-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      color: #ffffff;
      cursor: pointer;
    }

    /* Profile Container */
    .profile-container {
      max-width: 600px;
      margin: 50px auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 64, 128, 0.15);
      backdrop-filter: blur(15px);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      /* Animation */
      opacity: 0;
      animation: slideUpFadeIn 0.6s ease-out 0.2s forwards;
    }

    .logo-header {
      background: linear-gradient(90deg, #001F3F, #004080);
      padding: 40px 30px 20px;
      color: white;
      border-radius: 20px 20px 0 0;
    }

    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .logo-header img {
      max-width: 120px;
      max-height: 120px;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .logo-header h2 {
      font-size: 1.8em;
      margin: 0;
      color: #ffffff;
      font-weight: 700;
    }

    .logo-header p {
      margin-top: 5px;
      font-size: 0.95em;
      color: #e0e0e0;
      font-weight: 300;
    }

    .profile-section {
      padding: 40px;
      background-color: #ffffff;
      border-radius: 0 0 20px 20px;
    }

    .profile-display {
      margin-top: 20px;
      padding: 30px;
      background-color: #f8f9fa;
      border-radius: 15px;
      border: 1px solid #e9ecef;
      animation: fadeIn 0.5s ease-in-out;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-display h3 {
      color: #003366;
      margin-bottom: 20px;
      font-size: 1.6em;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .profile-display p {
      margin: 15px 0;
      font-size: 1.1em;
      color: #333;
      font-weight: 400;
    }

    .profile-display strong {
      color: #004080;
      font-weight: 600;
    }

    .footer-note {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #e9ecef;
      background-color: #ffffff;
    }

    .footer-note p {
      color: #6c757d;
      font-size: 0.95em;
      margin: 0;
      font-weight: 300;
    }

    /* Loading Overlay */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      z-index: 3000;
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: #004080;
      font-weight: bold;
      transition: opacity 0.3s ease;
      flex-direction: column;
      gap: 15px;
    }

    #loadingOverlay i {
      font-size: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideUpFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar-menu {
        gap: 15px;
      }
      .profile-container {
        max-width: 95%;
        margin: 30px auto;
        padding: 20px;
      }
      .logo-header {
        padding: 30px 20px 15px;
      }
      .logos {
        gap: 10px;
        flex-direction: column;
      }
      .logo-header img {
        max-width: 80px;
        max-height: 80px;
      }
      .logo-header h2 {
        font-size: 1.5em;
      }
      .profile-section {
        padding: 25px;
      }
      .profile-display {
        padding: 20px;
      }
      .navbar-menu {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: linear-gradient(90deg, #001F3F, #004080);
        flex-direction: column;
        padding: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        border-radius: 0 0 15px 15px;
      }
      .navbar-menu.active {
        display: flex;
      }
      .navbar-toggle {
        display: block;
      }
      .logout-btn {
        width: 100%;
        margin-top: 10px;
      }
    }

    @media (max-width: 480px) {
      .navbar-content {
        padding: 0 10px;
      }
    }
  </style>
</head>

<body class="fade-in">
  <nav class="navbar" id="navbar">
    <div class="navbar-content">
      <div class="navbar-brand">
        <i class="fas fa-user-shield"></i>
        Student Feedback System
      </div>
      <button class="navbar-toggle" id="navbarToggle">
        &#9776;
      </button>
      <ul class="navbar-menu" id="navbarMenu">
        <li><a href="#" class="nav-link" id="homeLink"><i class="fas fa-home"></i> Home</a></li>
        <li><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="profile-container">
      <div class="logo-header">
        <div class="logos">
          <img src="plpwalaa.png" alt="School Logo" id="schoolLogo">
        </div>
        <h2>Administrator Profile System</h2>
        <p>Your Administrator profile details.</p>
      </div>

      <div class="profile-section">
        <div class="profile-display">
          <h3><i class="fas fa-user"></i> Your Profile</h3>
          <p><strong>Username:</strong> <span id="profileUsername">Loading...</span></p>
          <p><strong>Role:</strong> Administrator</p>
        </div>

        <div class="footer-note">
          <p>This profile is displayed for verification purposes.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    Loading...
  </div>

  <script>
    window.addEventListener("load", () => {
      document.body.classList.add("fade-in");
    });

    const loadingOverlay = document.getElementById("loadingOverlay");
    const navbarToggle = document.getElementById("navbarToggle");
    const navbarMenu = document.getElementById("navbarMenu");

    navbarToggle.addEventListener("click", () => {
      navbarMenu.classList.toggle("active");
    });

    document.getElementById("homeLink").addEventListener("click", function(e) {
      e.preventDefault();
      loadingOverlay.textContent = "Loading dashboard...";
      loadingOverlay.style.display = "flex";
      document.body.style.opacity = "0.7";
      setTimeout(() => {
        window.location.href = "admin_dashboard.html";
      }, 1000);
    });

    document.getElementById("logoutBtn").addEventListener("click", function() {
      const confirmLogout = confirm("Are you sure you want to log out?");
      if (confirmLogout) {
        loadingOverlay.textContent = "Logging out...";
        loadingOverlay.style.display = "flex";
        document.body.style.opacity = "0.7";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
      }
    });
window.addEventListener("load", () => {
  fetch('get_profile.php')
    .then(response => response.json())
    .then(data => {
      console.log("Profile Data:", data); // <-- check output
      if (data.success) {
        document.getElementById("profileUsername").textContent = data.username;
      } else {
        document.getElementById("profileUsername").textContent = "Not Logged In";
        if (data.message) {
          alert(data.message);
          window.location.href = 'index.html';
        }
      }
    })
    .catch(error => {
      console.error('Error fetching profile:', error);
      document.getElementById("profileUsername").textContent = "Error loading profile";
    });
});

  </script>
</body>
</html>
